name: Package CyberWorldReset

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  PROJECT_NAME: CyberWorldReset

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build with Maven
        run: mvn -B -DskipTests package

      - name: Prepare plugin jar
        id: artifact
        shell: bash
        run: |
          VERSION=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          JAR_SOURCE="target/${PROJECT_NAME}-${VERSION}.jar"

          if [ ! -f "$JAR_SOURCE" ]; then
            mapfile -t JARS < <(find target -maxdepth 1 -type f -name "${PROJECT_NAME}-${VERSION}*.jar" ! -name "original-*" ! -name "*-sources.jar" ! -name "*-javadoc.jar" | sort)
            JAR_SOURCE="${JARS[0]:-}"
          fi

          if [ -z "$JAR_SOURCE" ] || [ ! -f "$JAR_SOURCE" ]; then
            echo "Could not find final plugin jar in target/."
            find target -maxdepth 1 -type f -name "*.jar" -print
            exit 1
          fi

          mkdir -p release-artifact
          JAR_PATH="release-artifact/${PROJECT_NAME}-${VERSION}.jar"
          cp "$JAR_SOURCE" "$JAR_PATH"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "path=$JAR_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload plugin jar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ steps.artifact.outputs.version }}
          path: ${{ steps.artifact.outputs.path }}
          if-no-files-found: error
          retention-days: 7
